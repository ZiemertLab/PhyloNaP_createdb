# PhyloNaP Pipeline — Conda environment
# Platform: macOS / Linux only
# Install: conda env create -f environment.yml
# Activate: conda activate phylonap_createdb
#
# NOTE: AliStat must be installed separately (not available via conda).
#       Run ./install_alistat.sh or build from source, then set the path
#       in config/config.yaml → tools.alistat
name: phylonap_createdb
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # --- Core Python ---
  - python=3.11
  - pip

  # --- Bioinformatics tools ---
  - mmseqs2>=15.6
  - mafft>=7.520
  - trimal>=1.5
  - fasttree>=2.1.11
  # NOTE: alistat is NOT available via conda — install separately
  #       (see install_alistat.sh or README)

  # --- TreeCluster ---
  - treecluster>=1.0.3

  # --- Snakemake ---
  - snakemake>=8.0

  # --- R + MAD rooting ---
  - r-base>=4.3
  - r-ape>=5.7
  - r-phangorn>=2.11
  - r-rcpp>=1.0
  - r-inline>=0.3
  - r-optparse>=1.7

  # --- Python packages ---
  - pandas>=2.1
  - biopython>=1.83
  - pyyaml>=6.0
  - numpy>=1.26
